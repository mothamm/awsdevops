apiVersion: v1
kind: Pod
metadata:
  name: mem-demo
spec:
  containers:
    - name: mem-demo
      image: polinux/stress
      resources:
        requests:
          memory: "128Mi"
        limits:
          memory: "200Mi"
      command: ["stress"]
      args: ["--vm", "1", "--vm-bytes", "250M", "--vm-hang", "1"]